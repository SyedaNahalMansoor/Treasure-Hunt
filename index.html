<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Treasure Hunt Game</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        overflow: hidden;
        font-family: Arial, sans-serif;
      }

      #game {
        width: 100vw;
        height: 100vh;
        background-image: url("forest.jpg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        position: relative;
      }

      #startScreen {
        position: absolute;
        inset: 0;

        background: rgba(0, 0, 0, 0.9);

        color: white;

        display: flex;
        flex-direction: column;

        justify-content: center;
        align-items: center;

        z-index: 5000;
      }

      #startScreen h1 {
        font-size: 60px;
        margin-bottom: 20px;
      }

      #startScreen p {
        font-size: 24px;
        margin: 8px 0;
      }

      #startBtn, #nextLevelBtn {
        margin-top: 20px;
        padding: 15px 30px;
        font-size: 22px;
        border: 3px solid white;
        border-radius: 10px;
        cursor: pointer;
        background-color: blue;
        color: white;
      }
      #player {
        width: 60px;
        height: 60px;
        font-size: 50px;
        position: absolute;
        left: 100px;
        top: 100px;
      }

      .coin {
        width: 40px;
        height: 40px;
        font-size: 35px;
        position: absolute;
        display: flex;
        justify-content: center;
        align-items: center;
        animation: spin 2s infinite;
        user-select: none;
      }

      #key {
        width: 50px;
        height: 50px;
        font-size: 40px;
        position: absolute;
        left: 700px;
        top: 120px;
        display: flex;
        justify-content: center;
        align-items: center;
        animation: float 1s infinite alternate;
        user-select: none;
      }

      #key2 {
        width: 50px;
        height: 50px;
        font-size: 40px;
        position: absolute;
        left: 1000px;
        top: 300px;
        display: none;
      }

      #chest {
        width: 70px;
        height: 70px;
        font-size: 55px;
        position: absolute;
        left: 900px;
        top: 450px;
        display: flex;
        justify-content: center;
        align-items: center;
        animation: bounce 1s infinite;
        user-select: none;
      }

      #score {
        font-size: 23px;
        font-weight: bold;
        color: white;
        padding: 10px 15px;
      }

      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes float {
        from {
          transform: translateY(0);
        }
        to {
          transform: translateY(-10px);
        }
      }

      @keyframes bounce {
        from {
          transform: translateY(0);
        }
        to {
          transform: translateY(-8px);
        }
      }

      /* #hud{
  position: absolute;
    top: 15px;
    left: 15px;

    background: rgba(0,0,0,0.7);
    color: white;

    padding: 12px 18px;
    border-radius: 15px;

    border: 2px solid gold;

    font-size: 22px;
    font-weight: bold;

    box-shadow: 0 0 15px gold;

    z-index: 1000;
} */

      .tree,
      .rock {
        position: absolute;
        font-size: 50px;
        user-select: none;
      }

      .tree {
        font-size: 60px;
      }

      .rock {
        font-size: 45px;
      }

      #winner {
        display: none;
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.8);
        color: white;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        font-size: 2rem;
      }
      button {
        padding: 10px 20px;
        margin-top: 20px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="game">
      <div id="startScreen">
        <h1>🎮 Treasure Hunt</h1>

        <p>🧙 Collect all 10 coins</p>
        <p>🗝️ Find the key</p>
        <p>💰 Open the treasure</p>
        <p>⌨️ Use Arrow Keys or WASD to move</p>

        <button id="startBtn">Start Game</button>
      </div>
      <div id="score">
        Coins: <span id="coin">0</span>/10
        <br />
        Key: <span id="keyStatus">No</span>
        <br />
        Level: <span id="level">1</span>
      </div>

      <div id="player">🧙</div>

      <div class="coin" style="left: 200px; top: 100px">🪙</div>
      <div class="coin" style="left: 400px; top: 150px">🪙</div>
      <div class="coin" style="left: 600px; top: 250px">🪙</div>
      <div class="coin" style="left: 300px; top: 350px">🪙</div>
      <div class="coin" style="left: 800px; top: 300px">🪙</div>

      <div class="coin" style="left: 150px; top: 500px">🪙</div>
      <div class="coin" style="left: 500px; top: 450px">🪙</div>
      <div class="coin" style="left: 750px; top: 100px">🪙</div>
      <div class="coin" style="left: 950px; top: 220px">🪙</div>
      <div class="coin" style="left: 1050px; top: 400px">🪙</div>

      <div id="key">🗝️</div>
      <div id="key2">🗝️</div>

      <!-- Trees -->
      <!-- <div class="tree" style="left:100px; top:200px;">🌳</div>
<div class="tree" style="left:500px; top:500px;">🌳</div> -->

      <!-- Rocks -->
      <!-- <div class="rock" style="left:300px; top:250px;">🪨</div>
<div class="rock" style="left:700px; top:400px;">🪨</div>
<div class="rock" style="left:900px; top:250px;">🪨</div>
<div class="rock" style="left:1050px;top:400px;">🪨</div>
<div class="rock" style="left:500px; top:150px;">🪨</div> -->

      <!-- Treasure -->
      <div id="chest">💰</div>

      <div id="winner">
        <h1>🏆 Level 1 Complete!</h1>
        <button id="nextLevelBtn">Level 2</button>
      </div>
    </div>

    <script>
      const coinSound = document.getElementById("coinSound");
      const winSound = document.getElementById("winSound");
      const player = document.getElementById("player");
      const coins = document.querySelectorAll(".coin");
      const key = document.getElementById("key");
      const chest = document.getElementById("chest");
      const scoreText = document.getElementById("coin");
      const keyStatus = document.getElementById("keyStatus");
      const winner = document.getElementById("winner");
      const levelText = document.getElementById("level");
      const key2 = document.getElementById("key2");
      const startBtn = document.getElementById("startBtn");
      const startScreen = document.getElementById("startScreen");

      let hasKey2 = false;

      let x = 50;
      let y = 50;

      let score = 0;
      let hasKey = false;

      document.addEventListener("keydown", (e) => {
        const speed = 20;

        if (e.key === "ArrowRight" || e.key === "d") {
          x += speed;
        }

        if (e.key === "ArrowLeft" || e.key === "a") {
          x -= speed;
        }

        if (e.key === "ArrowUp" || e.key === "w") {
          y -= speed;
        }

        if (e.key === "ArrowDown" || e.key === "s") {
          y += speed;
        }

        if (x < 0) x = 0;
        if (y < 0) y = 0;

        if (x > window.innerWidth - 50) {
          x = window.innerWidth - 50;
        }

        if (y > window.innerHeight - 50) {
          y = window.innerHeight - 50;
        }

        player.style.left = x + "px";
        player.style.top = y + "px";

        checkCoins();
        checkKey();
        checkKey2();
        checkChest();
      });

      function isColliding(a, b) {
        const rect1 = a.getBoundingClientRect();
        const rect2 = b.getBoundingClientRect();

        return !(
          rect1.right < rect2.left ||
          rect1.left > rect2.right ||
          rect1.bottom < rect2.top ||
          rect1.top > rect2.bottom
        );
      }

      function checkCoins() {
        coins.forEach((coin) => {
          if (coin.style.display !== "none" && isColliding(player, coin)) {
            coin.style.display = "none";
            // coinSound.currentTime = 0;
            // coinSound.play();
            score++;

            scoreText.innerText = score;
          }
        });
      }

      function checkKey() {
        if (!hasKey && isColliding(player, key)) {
          hasKey = true;

          key.style.display = "none";

          keyStatus.innerText = "Yes 🔑";
        }
      }

      function checkKey2() {
        if (
          !hasKey2 &&
          key2.style.display !== "none" &&
          isColliding(player, key2)
        ) {
          hasKey2 = true;

          key2.style.display = "none";
        }
      }

      function checkChest() {
        if (!isColliding(player, chest)) return;

        if (levelText.innerText == "1" && score === 10 && hasKey) {
          winner.querySelector("h1").innerText = "🏆 Level 1 Complete!";

          winner.querySelector("button").style.display = "block";

          // winSound.currentTime = 0;
          // winSound.play();

          winner.style.display = "flex";
        } else if (
          levelText.innerText == "2" &&
          score === 10 &&
          hasKey &&
          hasKey2
        ) {
          winner.querySelector("h1").innerText = "🎉 YOU WON THE GAME! 🎉";

          winner.querySelector("button").innerText = "Play Again";

          // winSound.currentTime = 0;
          // winSound.play();

          winner.style.display = "flex";

          document.getElementById("nextLevelBtn").onclick = () =>
            location.reload();
        }
      }

      document.getElementById("nextLevelBtn").addEventListener("click", level2);

      function level2() {
        levelText.innerText = "2";

        winner.style.display = "none";

        score = 0;

        hasKey = false;
        hasKey2 = false;

        scoreText.innerText = 0;

        keyStatus.innerText = "No";

        document.getElementById("game").style.backgroundImage =
          "url('forest2.jpg')";
        document.getElementById("score").style.color = "white";

        player.style.left = "50px";
        player.style.top = "50px";

        x = 50;
        y = 50;

        key.style.display = "block";
        key2.style.display = "block";

        key.style.left = "900px";
        key.style.top = "100px";

        key2.style.left = "1000px";
        key2.style.top = "300px";

        chest.style.display = "flex";
        chest.innerHTML = "💰";

        chest.style.left = "1150px";
        chest.style.top = "500px";

        randomCoins();
      }

      function randomCoins() {
        coins.forEach((coin) => {
          coin.style.display = "flex";

          coin.style.left = Math.floor(Math.random() * 1100) + "px";

          coin.style.top = Math.floor(Math.random() * 550) + "px";
        });
      }

      randomCoins();

      startBtn.addEventListener("click", () => {
        startScreen.style.display = "none";
      });
    </script>
    <!-- <audio id="coinSound">
      <source src="https://www.soundjay.com/misc/sounds/coin-drop-1.mp3" />
    </audio>

    <audio id="winSound">
      <source src="https://www.soundjay.com/human/sounds/applause-8.mp3" />
    </audio> -->
  </body>
</html>
